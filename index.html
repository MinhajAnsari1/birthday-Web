<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle,#1a0825,#0b0615);
  color:#fff;
  overflow-x:hidden;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

h1{
  font-family:'Dancing Script',cursive;
  font-size:4rem;
  color:#ff6bd6;
  text-shadow:0 0 25px #ff6bd6;
}

.name{color:#ffd36e;font-size:1.5rem}

.btn{
  margin-top:15px;
  padding:14px 28px;
  border:none;
  border-radius:999px;
  background:#ff4fa3;
  color:#fff;
  cursor:pointer;
  font-weight:700;
}

/* SECTIONS */
section{
  padding:50px 20px;
  max-width:1000px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:15px;
  text-align:center;
}

/* BALLOONS */
.balloon{
  position:fixed;
  bottom:-80px;
  opacity:0.25;
  font-size:22px;
  animation:up linear infinite;
}

@keyframes up{
  to{transform:translateY(-120vh)}
}

/* FIREWORK */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#ffcc00;
  animation:boom 1s ease-out forwards;
}

@keyframes boom{
  from{transform:scale(1);opacity:1}
  to{transform:scale(10);opacity:0}
}

/* LETTER */
#letter{
  margin-top:10px;
  padding:15px;
  background:rgba(255,255,255,0.08);
  border-radius:15px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🎉 Happy Birthday 🎉</h1>
  <div class="name">For Annie Khala ❤️</div>

  <button class="btn" onclick="start()">🎁 Open Surprise</button>
</div>

<section id="main" style="display:none">

<h2>📸 Memories</h2>

<div class="grid">

  <div class="card">
    <img src="photo1.JPG" alt="Photo 1" style="width:100%; border-radius:10px;">
  </div>

  <div class="card">
    <img src="photo2.jpg" alt="Photo 2" style="width:100%; border-radius:10px;">
  </div>

  <div class="card">
    <img src="photo3.jpg" alt="Photo 3" style="width:100%; border-radius:10px;">
  </div>

</div>

<h2>💖 Wishes</h2>
<div class="grid">
  <div class="card">Stay happy ❤️</div>
  <div class="card">Success ⭐</div>
  <div class="card">Smile 🌸</div>
</div>

<h2>💌 Special Message</h2>
<div class="card" onclick="openLetter()" style="cursor:pointer">
🎁 Click to reveal message
<div id="letter"></div>
</div>

</section>

<footer style="text-align:center;padding:20px;opacity:0.7">
Made with Minhaj Developer
</footer>

<script>

window.onload = function(){

  // balloons
  for(let i=0;i<15;i++){
    let b=document.createElement('div');
    b.className='balloon';
    b.textContent=['🎈','💖','✨','🎉'][i%4];
    b.style.left=Math.random()*100+'vw';
    b.style.animationDuration=(6+Math.random()*8)+'s';
    document.body.appendChild(b);
  }

  // START BUTTON FIXED
  window.start = function(){
    document.getElementById('main').style.display='block';
    document.getElementById('main').scrollIntoView({behavior:'smooth'});
    firework();
  }

  // FIREWORK FIXED
  function firework(){
    for(let i=0;i<25;i++){
      let f=document.createElement('div');
      f.className='firework';
      f.style.left=Math.random()*100+'vw';
      f.style.top=Math.random()*80+'vh';
      document.body.appendChild(f);
      setTimeout(()=>f.remove(),1000);
    }
  }

  // LETTER FIXED
  window.openLetter = function(){
    let text="You are special ❤️ May your life be full of happiness, success and love 🌸";
    let box=document.getElementById('letter');
    box.textContent="";

    let i=0;
    let t=setInterval(()=>{
      box.textContent+=text[i++];
      if(i>=text.length) clearInterval(t);
    },30);
  }

}

</script>

</body>
</html>
